services:
  - type: web
    name: human-robot-communication-experiment
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_DECISION_MODEL
        value: gpt-5.2
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_AUDIO_BUCKET
        value: participant-audio
      - key: WEB_ORIGIN
        sync: false
